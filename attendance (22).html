// ── STUDENT NAME AUTOCOMPLETE / AUTOFILL ──
let _autofillActive = false;
let _autofillMatchedId = null; // id of the existing student record matched via autofill
let _sugActiveIdx = -1;

window.onNameInput = function(input) {
  _autofillActive = false;
  const q = input.value.trim().toLowerCase();
  const box = document.getElementById('name-suggestions');
  if (!box) return;
  if (q.length < 2) { box.style.display='none'; return; }

  // Find unique students by name (any batch) - deduplicate by name+phone1
  const seen = new Map();
  state.students.forEach(s => {
    const key = s.name.toLowerCase();
    if (key.includes(q) && !seen.has(key)) seen.set(key, s);
  });
  const matches = [...seen.values()].slice(0, 8);

  if (!matches.length) { box.style.display='none'; return; }

  _sugActiveIdx = -1;
  box.innerHTML = matches.map((s,i) => {
    const batches = state.students.filter(x=>x.name.toLowerCase()===s.name.toLowerCase()).map(x=>{
      const b = BATCHES.find(bb=>bb.id===x.batch); return b?b.label:x.batch;
    }).join(', ');
    return `<div class="name-suggestion-item" data-idx="${i}" onmousedown="selectSuggestion(${JSON.stringify(s.id).replace(/"/g,"'")})" >
      <span class="sug-name">${s.name}</span>
      <span class="sug-meta">📞 ${s.phone1} &nbsp;·&nbsp; 📋 ${s.regNo} &nbsp;·&nbsp; Currently in: ${batches}</span>
    </div>`;
  }).join('');
  box.style.display = 'block';
};

window.onNameKeydown = function(e) {
  const box = document.getElementById('name-suggestions');
  if (!box || box.style.display==='none') return;
  const items = box.querySelectorAll('.name-suggestion-item');
  if (e.key==='ArrowDown') {
    e.preventDefault();
    _sugActiveIdx = Math.min(_sugActiveIdx+1, items.length-1);
    items.forEach((el,i)=>el.classList.toggle('active',i===_sugActiveIdx));
  } else if (e.key==='ArrowUp') {
    e.preventDefault();
    _sugActiveIdx = Math.max(_sugActiveIdx-1, -1);
    items.forEach((el,i)=>el.classList.toggle('active',i===_sugActiveIdx));
  } else if (e.key==='Enter' && _sugActiveIdx>=0) {
    e.preventDefault();
    items[_sugActiveIdx].dispatchEvent(new MouseEvent('mousedown'));
  } else if (e.key==='Escape') {
    box.style.display='none';
  }
};

window.selectSuggestion = function(studentId) {
  const s = state.students.find(x=>x.id===studentId);
  if (!s) return;
  const box = document.getElementById('name-suggestions');
  if (box) box.style.display='none';

  // Fill all fields from existing student record
  document.getElementById('f_name').value = s.name;
  document.getElementById('f_reg').value = s.regNo || '';
  document.getElementById('f_course').value = s.course || '';
  document.getElementById('f_ph1').value = s.phone1 || '';
  document.getElementById('f_ph2').value = s.phone2 || '';
  const durEl = document.getElementById('f_duration');
  if (durEl) durEl.value = s.courseDuration || '';
  const remEl = document.getElementById('f_rem');
  if (remEl) remEl.value = ''; // fresh remarks for new batch

  // Show banner
  const existingBatches = state.students
    .filter(x=>x.name.toLowerCase()===s.name.toLowerCase())
    .map(x=>{ const b=BATCHES.find(bb=>bb.id===x.batch); return b?b.label:x.batch; })
    .join(', ');
  const banner = document.getElementById('autofill-banner');
  const bannerText = document.getElementById('autofill-banner-text');
  if (banner && bannerText) {
    bannerText.textContent = `Details filled from existing record. Currently enrolled in: ${existingBatches}`;
    banner.style.display = 'flex';
  }
  _autofillActive = true;
  _autofillMatchedId = s.id;
};

window.clearAutofill = function() {
  ['f_name','f_reg','f_course','f_ph1','f_ph2'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  const durEl=document.getElementById('f_duration'); if(durEl) durEl.value='';
  const banner=document.getElementById('autofill-banner'); if(banner) banner.style.display='none';
  _autofillActive=false;
  _autofillMatchedId=null;
  document.getElementById('f_name').focus();
};

window.submitStudent = async function(editId) {
  const name = document.getElementById('f_name').value.trim();
  const regNo = document.getElementById('f_reg').value.trim();
  const course = document.getElementById('f_course').value.trim();
  const batch = document.getElementById('f_batch').value;
  const division = document.getElementById('f_div').value;
  const joinDate = document.getElementById('f_joindate').value;
  const courseDuration = parseInt(document.getElementById('f_duration').value)||0;
  const phone1 = document.getElementById('f_ph1').value.trim();
  const phone2 = document.getElementById('f_ph2').value.trim();
  const completedDate = document.getElementById('f_completedate').value || '';
  const remarks = document.getElementById('f_rem').value.trim();
  if (!name||!regNo||!course||!phone1) { showToast('⚠️ Please fill required fields (*)'); return; }

  const formData = {name,regNo,course,batch,division,joinDate,courseDuration,phone1,phone2,completedDate,remarks};

  if (editId) {
    const student = state.students.find(x=>x.id===editId);
    if (!student) return;
    const _oldBatchEdit = student.batch;
    // if division changed, ask whether it's a real transfer or just a data-entry correction
    if (division !== student.division) {
      const row = document.getElementById('transfer-date-row');
      const mode = row ? (row.dataset.mode || 'transfer') : 'transfer';

      if (mode === 'correction') {
        // Just fixing a mistake — no transfer recorded, no date needed.
        // Past attendance retroactively belongs to the corrected division too
        // (getStudentDivisionForDate falls back to student.division when there's
        // no history entry covering that date, so this fixes history automatically).
        if (!confirm(`Fix ${name}'s division to ${division.charAt(0).toUpperCase()+division.slice(1)}? No transfer will be recorded — this just corrects the record (including past attendance).`)) return;

        // If a real divisionHistory already exists, keep it consistent by renaming the latest entry instead of adding a new one
        if (student.divisionHistory && student.divisionHistory.length > 0) {
          student.divisionHistory[student.divisionHistory.length - 1].div = division;
        }

        removeStudentFromSeats(student.id);
        Object.assign(student, formData);
        closeModal();
        await saveStudent(student);
        autoFillSeats(student.batch);
        await saveSeating();
        showToast('✓ Division corrected — no transfer recorded');
        render();
        return;
      }

      const transferDateInput = document.getElementById('f_transfer_date');
      const transferDate = transferDateInput ? transferDateInput.value : dateStr(new Date());
      if (!transferDate) { showToast('⚠️ Please select the transfer date'); return; }

      const oldDiv = student.division.charAt(0).toUpperCase()+student.division.slice(1);
      const newDiv = division.charAt(0).toUpperCase()+division.slice(1);
      const d = new Date(transferDate+'T00:00:00');
      const dFmt = d.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});

      if (!confirm(`Transfer ${name} from ${oldDiv} → ${newDiv} from ${dFmt}?\n\n• ${oldDiv} teacher marks attendance up to ${dFmt}\n• ${newDiv} teacher marks from ${dFmt} onwards`)) return;

      if (!student.divisionHistory || student.divisionHistory.length === 0) {
        const sinceDate = student.joinDate || (student.joinedMonth ? student.joinedMonth+'-01' : state.month+'-01');
        student.divisionHistory = [{div: student.division, since: sinceDate}];
      }
      student.divisionHistory.push({div: division, since: transferDate});

      // Remove from old division seat — autoFillSeats will re-seat in new division zone
      removeStudentFromSeats(student.id);
      Object.assign(student, formData);
      closeModal();
      await saveStudent(student);
      autoFillSeats(student.batch);
      await saveSeating();
      showToast('✓ Division transfer saved — seat moved to new zone');
      render();
      return;
    } else if (batch !== _oldBatchEdit) {
      // Editing this exact student's batch field directly = explicit move/transfer.
      const transferDateInput = document.getElementById('f_batch_transfer_date');
      const transferDate = transferDateInput ? transferDateInput.value : dateStr(new Date());
      if (!transferDate) { showToast('⚠️ Please select the date they moved batches'); return; }

      const oldBatchObj = BATCHES.find(b=>b.id===_oldBatchEdit);
      const newBatchObj = BATCHES.find(b=>b.id===batch);
      const d = new Date(transferDate+'T00:00:00');
      const dFmt = d.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});

      if (!confirm(`Move ${name} from ${oldBatchObj?oldBatchObj.label:_oldBatchEdit} → ${newBatchObj?newBatchObj.label:batch} from ${dFmt}?\n\nAttendance marked before this date stays visible under the old batch (greyed, read-only); attendance from this date onwards goes under the new batch.`)) return;

      if (!student.batchHistory || student.batchHistory.length === 0) {
        const sinceDate = student.joinDate || (student.joinedMonth ? student.joinedMonth+'-01' : state.month+'-01');
        student.batchHistory = [{batch: _oldBatchEdit, since: sinceDate}];
      }
      student.batchHistory.push({batch, since: transferDate});

      // Remove from OLD batch seat only; do NOT auto-add to new batch.
      if (state.seatAssignments[_oldBatchEdit]) {
        const oldSeats = state.seatAssignments[_oldBatchEdit];
        for (let i = 0; i < oldSeats.length; i++) {
          if (oldSeats[i] === student.id) oldSeats[i] = null;
        }
      }
      Object.assign(student, formData);
      closeModal();
      await saveStudent(student);
      await saveSeating();
      showToast('✓ Batch transfer saved — old attendance preserved');
      render();
      return;
    }
    Object.assign(student, formData);
    closeModal();
    await saveStudent(student);
    await saveSeating();
    showToast('✓ Student updated');
    render();
    return;
  }

  // No editId — adding via "Add Student". Check for autofill match (same name+division, active).
  let mergeTarget = null;
  if (_autofillActive && _autofillMatchedId) {
    mergeTarget = state.students.find(x =>
      x.name.toLowerCase() === name.toLowerCase() &&
      x.division === division &&
      x.status === 'active'
    );
  }

  if (mergeTarget && mergeTarget.batch === batch) {
    // Same name, same division, same batch — definitely the same enrollment, just update details.
    if (!confirm(`${name} is already active in this division and batch. Update their existing record instead of creating a duplicate?`)) return;
    Object.assign(mergeTarget, {regNo,course,phone1,phone2,remarks,joinDate,courseDuration,completedDate});
    closeModal();
    await saveStudent(mergeTarget);
    await saveSeating();
    showToast('✓ Existing record updated');
    render();
    return;
  }

  if (mergeTarget && mergeTarget.batch !== batch) {
    // Same student, but a DIFFERENT batch was picked — ambiguous. Ask: move them, or add as a second batch?
    closeModal();
    showBatchChoiceModal(mergeTarget, formData);
    return;
  }

  // Brand new student
  const student = { id: uid(), name, regNo, course, batch, division, phone1, phone2, remarks, joinDate, courseDuration, completedDate, status:'active', joinedMonth: state.month, divisionHistory:[{div:division, since: joinDate||state.month+'-01'}] };
  state.students.push(student);
  closeModal();
  await saveStudent(student);
  autoFillSeats(student.batch);
  await saveSeating();
  showToast('✓ Student added & seated automatically');
  render();
};

// Shown when an autofill match is found in a DIFFERENT batch than the one selected.
// Lets the person explicitly choose: move the student to the new batch (remove old seat),
// or enroll them in the new batch as well while keeping their old batch seat untouched.
function showBatchChoiceModal(mergeTarget, formData) {
  const oldBatchLabel = (BATCHES.find(b=>b.id===mergeTarget.batch)||{}).label || mergeTarget.batch;
  const newBatchLabel = (BATCHES.find(b=>b.id===formData.batch)||{}).label || formData.batch;
  const mc = document.getElementById('modalContainer');
  mc.innerHTML = `<div class="modal-overlay" onclick="closeModalOnBg(event)">
    <div class="modal" style="max-width:420px">
      <div class="modal-title">
        ${formData.name} is already enrolled
        <button class="btn btn-sm" onclick="closeModal()" style="padding:4px 8px"><i class="ti ti-x"></i></button>
      </div>
      <div style="padding:4px 0 16px">
        <div style="font-size:13px;color:var(--text2);margin-bottom:14px">
          They're currently active in the <b>${oldBatchLabel}</b> batch. You selected <b>${newBatchLabel}</b>. What would you like to do?
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn" style="text-align:left;padding:12px" onclick="resolveBatchChoice('move')">
            <div style="font-weight:500">Move to ${newBatchLabel}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">Removes their seat in ${oldBatchLabel}. Use this if they're switching batch times.</div>
          </button>
          <button class="btn" style="text-align:left;padding:12px" onclick="resolveBatchChoice('add')">
            <div style="font-weight:500">Add as a second batch</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">Keeps their seat in ${oldBatchLabel} and also enrolls them in ${newBatchLabel} as a separate record.</div>
          </button>
        </div>
      </div>
    </div>
  </div>`;
  window._pendingBatchChoice = { mergeTarget, formData };
}

window.resolveBatchChoice = async function(choice) {
  const { mergeTarget, formData } = window._pendingBatchChoice || {};
  closeModal();
  if (!mergeTarget || !formData) return;

  if (choice === 'move') {
    // Move: remove from old batch seat, do not auto-seat in new batch
    const oldBatch = mergeTarget.batch;
    if (state.seatAssignments[oldBatch]) {
      const oldSeats = state.seatAssignments[oldBatch];
      for (let i = 0; i < oldSeats.length; i++) {
        if (oldSeats[i] === mergeTarget.id) oldSeats[i] = null;
      }
    }
    Object.assign(mergeTarget, {regNo:formData.regNo,course:formData.course,batch:formData.batch,phone1:formData.phone1,phone2:formData.phone2,remarks:formData.remarks,joinDate:formData.joinDate,courseDuration:formData.courseDuration,completedDate:formData.completedDate});
    await saveStudent(mergeTarget);
    await saveSeating();
    showToast(`✓ ${formData.name} moved to new batch — old seat removed`);
  } else {
    // Add as second batch: create a brand-new student record for the new batch enrollment,
    // leave the original record (and its seat) completely untouched.
    const newStudent = {
      id: uid(), name: formData.name, regNo: formData.regNo, course: formData.course,
      batch: formData.batch, division: formData.division, phone1: formData.phone1, phone2: formData.phone2,
      remarks: formData.remarks, joinDate: formData.joinDate, courseDuration: formData.courseDuration,
      completedDate: formData.completedDate, status: 'active', joinedMonth: state.month,
      divisionHistory: [{div: formData.division, since: formData.joinDate || state.month+'-01'}]
    };
    state.students.push(newStudent);
    await saveStudent(newStudent);
    autoFillSeats(newStudent.batch);
    await saveSeating();
    showToast(`✓ ${formData.name} added to new batch — original seat kept`);
  }
  window._pendingBatchChoice = null;
  render();
};

window.saveCallLog = async function(studentId, date, field, value) {

function renderExam(c) {
  const div = state.examTab;
  const allStudents = state.students.filter(s => s.status === 'active' || s.status === 'completed');
  const divExams = Object.values(state.exams).filter(e => e.division === div);

  // Track selected exam per division tab
  if (!state.selectedExam) state.selectedExam = {};
  // Auto-select first exam if none selected or selected no longer exists
  if (!state.selectedExam[div] || !state.exams[state.selectedExam[div]]) {
    state.selectedExam[div] = divExams.length > 0 ? divExams[0].id : null;
  }
  const selExamId = state.selectedExam[div];
  const selExam = selExamId ? state.exams[selExamId] : null;

  const subTabs = ['software','accounting','multimedia'].map(d=>`
    <div class="sub-tab ${state.examTab===d?'active':''}" onclick="state.examTab='${d}';render()">
      ${d==='software'?'💻 Software':d==='accounting'?'📊 Accounting':'🎨 Multimedia'}
    </div>`).join('');

  function studentMatchesExam(student, exam) {
    // If no subject specified, show all students (no filter)
    if (!exam.subject) return true;
    // Both exam subject AND student course may have multiple comma-separated values
    // e.g. exam subject: "AO,OP"  student course: "PY,AO"
    // A student matches if ANY of their courses appears in ANY of the exam subjects
    const examSubjects = (exam.subject || '').split(',').map(s => s.trim().toUpperCase()).filter(Boolean);
    const studentCourses = (student.course || '').split(',').map(c => c.trim().toUpperCase()).filter(Boolean);
    return studentCourses.some(c => examSubjects.includes(c));
  }

  // Exam selector dropdown
  const examDropdown = divExams.length === 0 ? '' : `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      <label style="font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap">Select Exam:</label>
      <select style="flex:1;min-width:200px;padding:8px 12px;border-radius:var(--radius);border:1px solid var(--border2);font-size:13px;background:var(--surface);color:var(--text);outline:none;cursor:pointer"
        onchange="state.selectedExam['${div}']=this.value;render()">
        ${divExams.map(e=>`<option value="${e.id}" ${e.id===selExamId?'selected':''}>${e.name} — ${e.subject||'All'} · ${e.date||''}</option>`).join('')}
      </select>
      ${selExam ? `
      <button class="btn btn-sm" onclick="openEditExam('${selExamId}')" style="color:var(--green-dark);border-color:#b6e8d7" title="Edit exam"><i class="ti ti-edit"></i></button>
      <button class="btn btn-sm" onclick="deleteExam('${selExamId}')" style="color:var(--red);border-color:#f5baba" title="Delete exam"><i class="ti ti-trash"></i></button>` : ''}
    </div>`;

  // Exam info bar
  const examInfoBar = selExam ? `
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--green-light);border:1px solid #b6e8d7;border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:12px">
      <span style="font-weight:600;color:var(--green-text);font-size:13px">${selExam.name}</span>
      ${selExam.subject ? `<span style="color:var(--green-text);background:white;border:1px solid #b6e8d7;border-radius:99px;padding:2px 8px">${selExam.subject}</span>` : ''}
      <span style="color:var(--text2)">Max: <b>${selExam.maxMarks}</b></span>
      ${selExam.date ? `<span style="color:var(--text2)">📅 ${new Date(selExam.date+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span>` : ''}
    </div>` : '';

  // Student list for selected exam
  let studentRows = '';
  if (selExam) {
    const eligibleRaw = allStudents.filter(s => studentMatchesExam(s, selExam));

    // A student enrolled in two batches (e.g. fast-track) has TWO separate
    // student records, so without grouping they'd show up as two different
    // "people" here. Group by name (same approach as the Students tab) so
    // they get exactly ONE row and ONE mark entry.
    const groupOrder = [];
    const groupMap = new Map();
    eligibleRaw.forEach(s => {
      const key = s.name.trim().toLowerCase();
      if (!groupMap.has(key)) { groupMap.set(key, []); groupOrder.push(key); }
      groupMap.get(key).push(s);
    });
    const eligible = groupOrder.map(key => groupMap.get(key));

    if (eligible.length === 0) {
      studentRows = `<div class="empty-state"><i class="ti ti-user-x"></i><div>No students match the subject "${selExam.subject}"</div></div>`;
    } else {
      studentRows = eligible.map(group => {
        // Marks are a property of the PERSON, not the batch enrollment — store/read
        // them against one canonical record (prefer the active one) for this person.
        const s = group.find(g => g.status === 'active') || group[0];
        const siblingIds = group.filter(g => g.id !== s.id).map(g => g.id);
        const marks = state.examMarks[s.id] || {};
        let v = marks[selExamId] !== undefined ? marks[selExamId] : '';
        let d = marks[selExamId + '__date'] || '';
        // Fall back to a sibling batch-record's saved mark/date, in case it was
        // entered there before this grouping existed.
        if (v === '') { for (const oid of siblingIds) { const om = state.examMarks[oid] || {}; if (om[selExamId] !== undefined) { v = om[selExamId]; break; } } }
        if (!d) { for (const oid of siblingIds) { const om = state.examMarks[oid] || {}; if (om[selExamId + '__date']) { d = om[selExamId + '__date']; break; } } }
        const dFmt = d ? new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : '';
        const pct = v !== '' ? Math.round(Number(v) / selExam.maxMarks * 100) : null;
        const grade = pct === null ? '' : pct >= 85 ? 'A' : pct >= 65 ? 'B' : pct >= 50 ? 'C' : 'D';
        const gradeColor = grade==='A'?'var(--green)':grade==='B'?'#1D4ED8':grade==='C'?'var(--amber)':'var(--red)';
        const divIcon = s.division==='software'?'💻':s.division==='accounting'?'📊':'🎨';
        const multiBatchChip = group.length > 1
          ? `<span class="multi-chip" title="Enrolled in ${group.length} batches — marks are entered once for this person">🔗 ${group.length} batches</span>`
          : '';
        return `
        <div style="display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);background:${s.status==='completed'?'var(--bg)':'var(--surface)'}">
          <div class="student-avatar" style="width:34px;height:34px;font-size:12px;${s.status==='completed'?'background:var(--bg2);color:var(--text2)':'background:var(--green-light);color:var(--green-text)'}">${initials(s.name)}</div>
          <div>
            <div style="font-weight:600;font-size:13px">${s.name}
              ${s.status==='completed'?'<span style="font-size:9px;background:var(--bg2);color:var(--text2);border:1px solid var(--border2);border-radius:99px;padding:1px 6px;margin-left:4px">Completed</span>':''}
              ${multiBatchChip}
            </div>
            <div style="font-size:11px;color:var(--text2);margin-top:1px">${s.regNo} · ${s.course} · ${divIcon} ${s.division||''}</div>
            ${dFmt ? `<div style="font-size:10px;color:var(--green-text);margin-top:2px">📅 Exam date: ${dFmt}</div>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <div style="display:flex;align-items:center;gap:4px">
              <input class="mark-input" type="number" min="0" max="${selExam.maxMarks}" value="${v}"
                onchange="saveMark('${s.id}','${selExamId}',this.value)" placeholder="–"
                style="width:64px;text-align:center;font-size:14px;font-weight:600">
              <span style="font-size:12px;color:var(--text3)">/ ${selExam.maxMarks}</span>
            </div>
            <input type="date" value="${d}" title="Exam date"
              style="font-size:10px;padding:2px 6px;border:1px solid var(--border2);border-radius:4px;color:var(--text2);background:var(--bg);width:130px"
              onchange="saveMarkDate('${s.id}','${selExamId}',this.value)">
          </div>
          <div style="text-align:center;min-width:44px">
            ${pct !== null ? `
              <div style="font-weight:700;font-size:14px;color:${gradeColor}">${pct}%</div>
              <span class="grade grade-${grade}">${grade}</span>` : '<span style="color:var(--text3);font-size:12px">–</span>'}
          </div>
        </div>`;
      }).join('');
    }
  }

  c.innerHTML = `
    <div class="section-header">
      <div class="section-title">Examination</div>
      <button class="btn btn-primary" onclick="openAddExam()"><i class="ti ti-plus"></i> Add exam / test</button>
    </div>
    <div class="sub-tabs">${subTabs}</div>
    <div class="info-row"><i class="ti ti-info-circle"></i> Select an exam from the dropdown, then enter marks. Grades: A≥85%, B≥65%, C≥50%, D&lt;50%.</div>

    ${divExams.length === 0
      ? `<div class="empty-state"><i class="ti ti-writing"></i><div>No exams added yet for ${div}</div><div style="font-size:12px;margin-top:6px">Click "Add exam / test" to create one</div></div>`
      : `${examDropdown}${examInfoBar}
         <div class="card" style="padding:0;overflow:hidden">
           ${studentRows}
         </div>`
    }`;
}

function checkCourseDurations() {
  const today = new Date(); today.setHours(0,0,0,0);
  const overdue = state.students.filter(s => {
    if (s.status !== 'active' || !s.joinDate || !s.courseDuration) return false;
    const end = new Date(s.joinDate + 'T00:00:00');
    end.setMonth(end.getMonth() + Number(s.courseDuration));
    return end < today;
  });
  if (overdue.length === 0) return;
  const lines = overdue.map(s => {
    const end = new Date(s.joinDate + 'T00:00:00');
    end.setMonth(end.getMonth() + Number(s.courseDuration));
    const diffDays = Math.floor((today - end) / 86400000);
    const endFmt = end.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    return `• ${s.name} (${s.course}) — ended ${endFmt}, ${diffDays} day${diffDays!==1?'s':''} overdue`;
  }).join('\n');
  alert(`⚠️ Course duration expired for ${overdue.length} student${overdue.length!==1?'s':''}:\n\n${lines}\n\nPlease mark them as completed or extend their course.`);
}

// Auto-fill seats for a batch with active students (preserve existing manual assignments)
function autoFillSeats(batchId) {
  if (!state.seatAssignments[batchId]) state.seatAssignments[batchId] = new Array(TOTAL_SYSTEMS).fill(null);
  const seats = [...state.seatAssignments[batchId]];
  while (seats.length < TOTAL_SYSTEMS) seats.push(null);

  // Division-to-slot ranges: Software 0-13, Accounting 14-27, Multimedia 28-33
  const DIV_RANGE = { software: [0, 13], accounting: [14, 27], multimedia: [28, 33] };

  // ── PASS 1: fill each division within its own zone range ──
  const overflowStudents = []; // students who don't fit in their own zone
  ['software', 'accounting', 'multimedia'].forEach(div => {
    const [start, end] = DIV_RANGE[div];
    // Students of this division in this batch, active
    const divStudents = state.students.filter(s => s.batch === batchId && s.status === 'active' && s.division === div);
    // Already seated IDs anywhere in the batch (own zone OR a previous overflow seat elsewhere)
    const alreadySeated = new Set();
    for (let i = 0; i < TOTAL_SYSTEMS; i++) {
      if (seats[i]) {
        const s = state.students.find(x => x.id === seats[i]);
        if (s && s.status === 'active' && s.division === div) alreadySeated.add(seats[i]);
      }
    }
    // Clear seats in this range that belong to wrong division OR completed students (safety fix)
    for (let i = start; i <= end; i++) {
      if (seats[i]) {
        const s = state.students.find(x => x.id === seats[i]);
        if (!s || s.division !== div || s.status !== 'active') { seats[i] = null; }
      }
    }
    // Unseated students of this division
    const unseated = divStudents.filter(s => !alreadySeated.has(s.id));
    // Fill empty slots in range
    let ui = 0;
    for (let i = start; i <= end && ui < unseated.length; i++) {
      if (!seats[i]) { seats[i] = unseated[ui].id; ui++; }
    }
    // Anyone left over from this division couldn't fit in their own zone
    for (; ui < unseated.length; ui++) overflowStudents.push(unseated[ui]);
  });

  // ── PASS 2: seat overflow students in ANY empty seat, regardless of zone ──
  // (e.g. Multimedia has only 6 systems but 9 students — the extra 3 sit in
  // empty Software/Accounting seats, clearly marked as overflow when rendered)
  let oi = 0;
  for (let i = 0; i < TOTAL_SYSTEMS && oi < overflowStudents.length; i++) {
    if (!seats[i]) { seats[i] = overflowStudents[oi].id; oi++; }
  }

  state.seatAssignments[batchId] = seats;
}

// Remove a student from all seats in a batch (called on delete/complete)
function removeStudentFromSeats(studentId) {
  Object.keys(state.seatAssignments).forEach(batchId => {
    const seats = state.seatAssignments[batchId];
    if (!seats) return;
    for (let i = 0; i < seats.length; i++) {
      if (seats[i] === studentId) seats[i] = null;
    }
  });
}

window.clearSeat = async function(batchId, idx) {
  if (!state.seatAssignments[batchId]) return;
  state.seatAssignments[batchId][idx] = null;
  await saveSeating();
  render();
};

window.autoFillAndSave = async function(batchId) {
  autoFillSeats(batchId);
  await saveSeating();
  showToast('✓ Empty seats filled');
  render();
};

window.resetSeats = async function(batchId) {
  if (!confirm('Clear all seat assignments for this batch and re-auto-fill?')) return;
  state.seatAssignments[batchId] = new Array(TOTAL_SYSTEMS).fill(null);
  autoFillSeats(batchId);
  await saveSeating();
  showToast('✓ Seating reset');
  render();
};

window.openSeatPicker = function(batchId, idx) {
  const slotDiv = idx < 14 ? 'software' : idx < 28 ? 'accounting' : 'multimedia';
  const seats = state.seatAssignments[batchId] || [];
  const seated = new Set(seats.filter(Boolean));
  const DIV_RANGE = { software: [0, 13], accounting: [14, 27], multimedia: [28, 33] };

  // Unseated students of THIS slot's own division
  const ownDiv = state.students.filter(s => s.batch === batchId && s.status === 'active' && s.division === slotDiv && !seated.has(s.id));

  // Unseated students of OTHER divisions whose own zone is completely full
  // (these are overflow candidates — they have nowhere else to sit)
  const otherOverflow = ['software','accounting','multimedia'].filter(d => d !== slotDiv).flatMap(d => {
    const [start,end] = DIV_RANGE[d];
    const zoneFull = seats.slice(start, end+1).every(Boolean);
    if (!zoneFull) return [];
    return state.students.filter(s => s.batch === batchId && s.status === 'active' && s.division === d && !seated.has(s.id));
  });

  const available = [...ownDiv, ...otherOverflow];
  if (!available.length) { showToast(`No unseated students available for this seat`); return; }
  const rows = available.map(s => {
    const divIcon = s.division === 'software' ? '💻' : s.division === 'accounting' ? '📊' : '🎨';
    const isOverflow = s.division !== slotDiv;
    return `<div onclick="assignSeat('${batchId}',${idx},'${s.id}')" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">
      <div class="student-avatar" style="width:32px;height:32px;font-size:11px">${initials(s.name)}</div>
      <div>
        <div style="font-size:13px;font-weight:500">${s.name} ${isOverflow?`<span style="font-size:9px;font-weight:700;background:var(--amber-light);color:var(--amber-text);padding:1px 5px;border-radius:99px;margin-left:4px">⇄ overflow</span>`:''}</div>
        <div style="font-size:11px;color:var(--text2)">${s.regNo} · ${divIcon} ${s.course}${isOverflow?` — ${s.division} zone full`:''}</div>
      </div>
    </div>`;
  }).join('');
  const mc = document.getElementById('modalContainer');
  mc.innerHTML = `<div class="modal-overlay" onclick="closeModalOnBg(event)">
    <div class="modal" style="max-width:400px;padding:0;overflow:hidden">
      <div class="modal-title" style="padding:16px 18px;border-bottom:1px solid var(--border);margin:0">
        <span><i class="ti ti-armchair" style="color:var(--green);margin-right:6px"></i>Assign to System ${idx + 1}</span>
        <button class="btn btn-sm" onclick="closeModal()" style="padding:4px 8px"><i class="ti ti-x"></i></button>
      </div>
      <div style="max-height:60vh;overflow-y:auto">${rows}</div>
    </div>
  </div>`;
};

window.assignSeat = async function(batchId, idx, studentId) {
  if (!state.seatAssignments[batchId]) state.seatAssignments[batchId] = new Array(TOTAL_SYSTEMS).fill(null);
  // Remove student from any other seat first
  for (let i = 0; i < TOTAL_SYSTEMS; i++) {
    if (state.seatAssignments[batchId][i] === studentId) state.seatAssignments[batchId][i] = null;
  }
  state.seatAssignments[batchId][idx] = studentId;
  await saveSeating();
  closeModal();
  showToast('✓ Student seated');
  render();
};

window.state = state;

// Builds just the search-results HTML (used both on full render and on input, to keep focus in the search box)
function buildAnalyticsSearchResultsHTML() {
  const q = state.analyticsQuery.trim().toLowerCase();
  if (!q) {
    return `<div class="empty-state"><i class="ti ti-search"></i><div>Type a student's name or registration number to see their individual attendance analysis.</div></div>`;
  }

  const ym = state.month;
  const groups = groupStudentsByPerson(state.students);
  const matches = [];
  groups.forEach((group, key) => {
    const matchesQuery = key.includes(q) || group.some(s => s.regNo.toLowerCase().includes(q));
    if (matchesQuery) matches.push(group);
  });

  if (matches.length === 0) {
    return `<div class="empty-state"><i class="ti ti-user-x"></i><div>No student matches "${state.analyticsQuery}"</div></div>`;
  }

  const cards = matches.slice(0, 15).map(group => {
    const primary = group.find(g => g.status === 'active') || group[0];
    const stats = computePersonAttendanceStats(group, ym);
    const donutSegments = [
      { value: stats.P, color: '#5DCAA5' },
      { value: stats.A, color: '#F09595' },
      { value: stats.L, color: '#FAC775' },
    ];
    const donut = donutChartHTML(donutSegments, 96, stats.marked > 0 ? stats.pct+'%' : '—', stats.marked > 0 ? 'present' : 'no data');

    const enrollmentBadges = group.map(s => {
      const divIcon = s.division==='software'?'💻':s.division==='accounting'?'📊':'🎨';
      const bObj = BATCHES.find(b=>b.id===s.batch);
      const statusTag = s.status==='completed' ? '<span style="font-size:9px;background:var(--bg2);color:var(--text3);padding:1px 5px;border-radius:99px;margin-left:4px">Completed</span>' : '';
      return `<span style="font-size:10px;background:var(--bg2);border:1px solid var(--border2);padding:2px 7px;border-radius:99px;margin-right:4px;display:inline-block;margin-bottom:4px">${divIcon} ${s.course} · ${bObj?bObj.label:s.batch}${statusTag}</span>`;
    }).join('');

    return `
      <div class="stat-card" style="text-align:left;padding:18px;margin-bottom:14px">
        <div style="display:flex;gap:18px;flex-wrap:wrap">
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            ${donut}
            ${stats.marked>0 ? `<div style="font-size:10px;color:var(--text2);text-align:center">${stats.P}P · ${stats.A}A · ${stats.L}L</div>` : ''}
          </div>
          <div style="flex:1;min-width:200px">
            <div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px;cursor:default"
              onmouseenter="showStudentPopup(event,'${primary.id}')" onmousemove="positionStudentPopup(event)" onmouseleave="hideStudentPopup()">
              ${primary.name}
              ${group.length>1?`<span class="multi-chip">🔗 ${group.length} batches</span>`:''}
            </div>
            <div style="font-size:11px;color:var(--text2);margin:4px 0 8px">${primary.regNo} · ${primary.phone1||''}</div>
            <div>${enrollmentBadges}</div>
            ${stats.marked===0?'<div style="font-size:11px;color:var(--text3);margin-top:6px">No attendance marked yet this month</div>':''}
          </div>
        </div>
      </div>`;
  }).join('');

  const moreNote = matches.length > 15 ? `<div style="font-size:11px;color:var(--text3);margin-top:6px">Showing first 15 of ${matches.length} matches — refine your search to narrow it down.</div>` : '';
  return cards + moreNote;
}

window.renderAnalyticsResultsOnly = function() {
  const el = document.getElementById('analyticsResults');
  if (!el) { render(); return; }
  el.innerHTML = buildAnalyticsSearchResultsHTML();
};

</script>
